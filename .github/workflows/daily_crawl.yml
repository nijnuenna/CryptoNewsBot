name: Daily Crypto News Bot

on:
  schedule:
      - cron: '40 22 * * 0-4'
    
  workflow_dispatch: # 이 줄이 있어야 'Run workflow' 버튼이 생깁니다.

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python 0311.py
